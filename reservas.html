<body>

    
<header>

<h1>Reservas - Eco Camping Cascada del Ángel</h1>

</header>

        
<nav>
<a href="index.html">Inicio</a>
<a href="servicios.html">Servicios</a>
<a href="faq.html">FAQ</a>

<a href="informacionadicional.html">Informacion adicional</a>

</nav>
    
<section>

<h2>Reservas en Línea</h2>

<form onsubmit="return reservar()">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="email" id="correo" placeholder="Correo" required>

<label>Fecha de llegada</label>
<input type="date" id="entrada" required onchange="calcularDias()">

<label>Fecha de salida</label>
<input type="date" id="salida" required onchange="calcularDias()">

<input type="number" id="personas" placeholder="Cantidad de personas" min="1" required>

<div id="diasEstadia"></div>

<button class="btn">Reservar</button>

<div class="resultado" id="mensajeReserva"></div>

</form>

</section>

<script>

function calcularDias(){
    var entrada = document.getElementById("entrada").value;
    var salida = document.getElementById("salida").value;

    if(entrada && salida){
        var fechaEntrada = new Date(entrada);
        var fechaSalida = new Date(salida);

        var diferencia = fechaSalida - fechaEntrada;
        var dias = diferencia / (1000 * 60 * 60 * 24);

        if(dias > 0){
            document.getElementById("diasEstadia").innerHTML =
            "Estadía de " + dias + " día(s).";
        }else{
            document.getElementById("diasEstadia").innerHTML =
            "La fecha de salida debe ser mayor a la fecha de llegada.";
        }
    }
}

function reservar(){

    var nombre = document.getElementById("nombre").value;
    var correo = document.getElementById("correo").value;
    var personas = document.getElementById("personas").value;
    var entrada = document.getElementById("entrada").value;
    var salida = document.getElementById("salida").value;

    var mensaje = document.getElementById("mensajeReserva");

    if(nombre && correo && personas && entrada && salida){

        var fechaEntrada = new Date(entrada);
        var fechaSalida = new Date(salida);

        if(fechaSalida > fechaEntrada){
            mensaje.innerHTML =
            "✔ Su reserva se ha realizado con éxito. ¡Gracias por elegir Cascada del Ángel!";
        }else{
            mensaje.innerHTML =
            "⚠ La fecha de salida debe ser mayor a la fecha de llegada.";
        }

    } else {
        mensaje.innerHTML =
        "⚠ Por favor complete todos los campos.";
    }

    return false;
}


</script>
  
  <a href="index.html" style="background:#2e8b57;color:white;padding:10px 20px;text-decoration:none;border-radius:5px;">

</a>
